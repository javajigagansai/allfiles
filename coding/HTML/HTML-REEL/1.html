<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instagram DM UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="1.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="phone">

  <!-- Header -->
  <div class="header">
    <div class="left">
      <img src="" class="profile">
      <div>
        <h4>Hari chandana. N</h4>
        <p>chandana_naidu</p>
      </div>
    </div>
    <div class="icons">
        <p>
            j
        </p>
        <i class="fa-light fa-phone" style="color: #000000;"></i>
        <i class="fa-light fa-video" style="color: #000000;"></i>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat">

    <div class="msg left">Start aaa</div>

    <div class="msg right emoji">🤔 🫣</div>
    <div class="msg right">Okk</div>

    <div class="msg left">If I was a flower ?</div>
    <div class="msg left">...</div>

    <div class="msg right image">
      <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
      <span class="heart">❤️</span>
    </div>

    <div class="msg left">If I was a actress..?</div>

  </div>

  <!-- Input -->
  <div class="input">
    😊
    <input type="text" placeholder="Message...">
    🎤 🖼️
  </div>

</div>

</body>
</html>
