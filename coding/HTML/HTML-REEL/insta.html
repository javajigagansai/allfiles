<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instagram DM</title>
  <link rel="stylesheet" href="insta.css">
</head>
<body>

<div class="phone">
  <!-- TOP BAR -->
  <div class="top">
    <span class="name">sky</span>

    <div class="actions">
      <!-- group -->
      <svg viewBox="0 0 24 24">
        <path d="M7 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm10 0a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
        <path d="M2 20c0-3 3-5 5-5s5 2 5 5"/>
        <path d="M12 20c0-3 3-5 5-5s5 2 5 5"/>
        <circle cx="17.5" cy="6.5" r="2" class="dot"/>
      </svg>

      <!-- phone -->
      <svg viewBox="0 0 24 24">
        <path d="M6.5 3.5l4 2-2 3c1.5 3 4 5.5 7 7l3-2 2 4-3.5 2c-6-3-10-7-13-13z"/>
      </svg>

      <!-- video -->
      <svg viewBox="0 0 24 24">
        <rect x="3" y="6" width="13" height="12" rx="2"/>
        <path d="M16 10l5-3v10l-5-3z"/>
      </svg>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div class="bubble left">Hey</div>
    <div class="bubble right">Hi 👋</div>
    <div class="bubble left">What are you doing?</div>
  </div>

  <!-- INPUT -->
  <div class="input">
    <input placeholder="Message..." />
  </div>
</div>

</body>
</html>
