<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POV - When a coder apologizes with his heart 💻❤️</title>
  <style>
    :root {
      --pink: #ff6b9d;
      --light-pink: #ffe6f0;
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0a0a;
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    .top-text {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(16px, 2.5vw, 22px);
      z-index: 1000;
      background: rgba(255, 107, 157, 0.15);
      padding: 8px 24px;
      border-radius: 50px;
      box-shadow: 0 0 25px rgba(255, 107, 157, 0.4);
      text-shadow: 0 0 15px rgba(255, 107, 157, 0.6);
      white-space: nowrap;
      letter-spacing: 1px;
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow { 
      from { text-shadow: 0 0 10px rgba(255,107,157,0.4); } 
      to { text-shadow: 0 0 25px rgba(255,107,157,0.9); } 
    }

    .pink-screen {
      position: absolute;
      top: 70px;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #ffe6f0 0%, #ffd1e6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      overflow: hidden;
      z-index: 1;
    }

    /* Rising hearts */
    .rising-hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    .rising-heart {
      position: absolute;
      font-size: 14px;
      color: #ff4d94;
      filter: drop-shadow(0 0 6px currentColor);
      animation: riseHeart linear infinite;
      opacity: 1;
    }
    @keyframes riseHeart {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120px) rotate(720deg); opacity: 0; }
    }

    /* Falling hearts */
    .falling-hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
      display: none;
    }
    .falling-heart {
      position: absolute;
      font-size: 13px;
      color: #ff4d94;
      filter: drop-shadow(0 0 6px currentColor);
      animation: fallHeart linear infinite;
      opacity: 1;
    }
    @keyframes fallHeart {
      0%   { transform: translateY(-120px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Envelope */
    .envelope {
      width: 260px;
      height: 180px;
      background: #ff6b9d;
      position: relative;
      cursor: pointer;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(255, 107, 157, 0.4);
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      z-index: 10;
    }
    .envelope:hover { transform: scale(1.12) rotate(3deg); }
    .envelope::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 90px;
      background: #ff99c2;
      clip-path: polygon(0 0, 50% 55%, 100% 0);
      transition: all 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
      z-index: 2;
    }
    .envelope.open::before { 
      transform: rotateX(180deg); 
      height: 0; 
    }
    .envelope span {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      color: white;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 3;
    }
    .envelope.flying-away {
      animation: flyAway 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes flyAway {
      0%   { transform: scale(1) translateY(0); opacity: 1; }
      100% { transform: scale(0.25) translateY(220px); opacity: 0; }
    }

    .envelopes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 25px;
      max-width: 720px;
      width: 90%;
      margin-top: 40px;
      z-index: 10;
    }

    .memory-card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 88%;
      max-width: 560px;
      background: #fff9c4;
      color: #222;
      border-radius: 20px;
      padding: 28px 22px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.35);
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 20;
      animation: cardPop 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .memory-card.show { display: flex; }
    @keyframes cardPop {
      0%   { opacity: 0; transform: scale(0.6) translate(-50%, 40%); }
      100% { opacity: 1; transform: scale(1) translate(-50%, -50%); }
    }

    .memory-card img {
      width: 50%;
      max-height: 245px;           /* Slightly reduced for better balance */
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .memory-card2 img {
      width: 75%;
      max-height: 345px;           /* Slightly reduced for better balance */
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .message {
      font-size: clamp(15px, 2.1vw, 17.5px);
      line-height: 1.75;
      text-align: center;
      padding: 0 18px;
      margin: 12px 0 8px;
      max-width: 100%;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    .back-btn {
      margin-top: 15px;
      padding: 14px 40px;
      background: #ff6b9d;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255,107,157,0.4);
      transition: all 0.3s ease;
    }
    .back-btn:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 12px 30px rgba(255,107,157,0.5); 
    }

    .final-love {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ff9ec8, #ff3366);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 100;
    }
    .love-btn {
      padding: 28px 68px;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 900;
      background: #fff;
      color: #ff3366;
      border: none;
      border-radius: 60px;
      box-shadow: 0 0 60px rgba(255, 51, 102, 0.7), 0 15px 40px rgba(0,0,0,0.3);
      cursor: pointer;
      animation: lovePulse 1.8s ease-in-out infinite;
    }
    @keyframes lovePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    #confetti { position: absolute; inset: 0; pointer-events: none; z-index: 200; }
  </style>
</head>
<body>

  <div class="top-text">
    POV - When a coder apologizes with his heart 💻❤️
  </div>

  <div class="pink-screen" id="pinkScreen">
    <div class="rising-hearts" id="risingHearts"></div>
    <div class="falling-hearts" id="fallingHearts"></div>

    <div class="envelope" id="mainEnvelope" onclick="openFirstEnvelope()">
      <span>Tap to open ❤️</span>
    </div>

    <p id="textBelow" style="margin-top:35px; font-size:clamp(20px,3vw,26px); color:#ff3366; font-weight:700; opacity:0; transition:opacity 1s;">
      Something from my heart...
    </p>
  </div>

  <!-- 6 Memory Cards -->
  <div class="memory-card" id="memory1">
    <img src="1ST.jpeg" alt="Memory 1" onerror="this.src='https://picsum.photos/id/1015/800/500'">
    <div class="message" id="msg1"></div>
    <button class="back-btn" onclick="backToEnvelopes()">Back</button>
  </div>

  <div class="memory-card2" id="memory2">
    <img src="2ND.jpeg" alt="Memory 2" onerror="this.src='https://picsum.photos/id/237/800/500'">
    <div class="message" id="msg2"></div>
    <button class="back-btn" onclick="backToEnvelopes()">Back</button>
  </div>

  <div class="memory-card" id="memory3">
    <img src="3RD.jpeg" alt="Memory 3" onerror="this.src='https://picsum.photos/id/1005/800/500'">
    <div class="message" id="msg3"></div>
    <button class="back-btn" onclick="backToEnvelopes()">Back</button>
  </div>

  <div class="memory-card" id="memory4">
    <img src="4TH.jpeg" alt="Memory 4" onerror="this.src='https://picsum.photos/id/1016/800/500'">
    <div class="message" id="msg4"></div>
    <button class="back-btn" onclick="backToEnvelopes()">Back</button>
  </div>

  <div class="memory-card" id="memory5">
    <img src="5th.webp" alt="Memory 5" onerror="this.src='https://picsum.photos/id/133/800/500'">
    <div class="message" id="msg5"></div>
    <button class="back-btn" onclick="backToEnvelopes()">Back</button>
  </div>

  <div class="memory-card" id="memory6">
    <img src="https://picsum.photos/id/201/800/500" alt="Memory 6">
    <div class="message" id="msg6"></div>
    <button class="back-btn" onclick="backToEnvelopes()">Back</button>
  </div>

  <!-- Final I LOVE YOU -->
  <div class="final-love" id="finalScreen">
    <canvas id="confetti"></canvas>
    <div onclick="launchLove()" class="love-btn">I LOVE YOU ❤️</div>
    <p style="margin-top:30px; font-size:20px; opacity:0.9; text-shadow:0 0 15px rgba(255,255,255,0.8);">Tap with all your heart</p>
  </div>

  <script>
    // Rising hearts
    function createRisingHearts(count = 42) {
      const container = document.getElementById('risingHearts');
      container.innerHTML = '';
      const emojis = ['❤️', '💗', '💖', '💕'];
      for (let i = 0; i < count; i++) {
        const h = document.createElement('div');
        h.className = 'rising-heart';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = Math.random() * 100 + 'vw';
        h.style.fontSize = (Math.random() * 12 + 10) + 'px';
        h.style.animationDuration = (Math.random() * 9 + 10) + 's';
        h.style.animationDelay = '-' + Math.random() * 18 + 's';
        container.appendChild(h);
      }
    }

    // Falling hearts
    let fallingInterval = null;
    function startFallingHearts() {
      const container = document.getElementById('fallingHearts');
      container.style.display = 'block';
      container.innerHTML = '';
      const emojis = ['❤️', '💗', '💖', '💕'];
      for (let i = 0; i < 28; i++) {
        const h = document.createElement('div');
        h.className = 'falling-heart';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = Math.random() * 100 + 'vw';
        h.style.fontSize = (Math.random() * 11 + 9) + 'px';
        h.style.animationDuration = (Math.random() * 6 + 8) + 's';
        h.style.animationDelay = '-' + Math.random() * 10 + 's';
        container.appendChild(h);
      }
      fallingInterval = setInterval(() => {
        if (!document.querySelector('.memory-card.show')) {
          clearInterval(fallingInterval);
          container.style.display = 'none';
          return;
        }
        const h = document.createElement('div');
        h.className = 'falling-heart';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = Math.random() * 100 + 'vw';
        h.style.fontSize = (Math.random() * 11 + 9) + 'px';
        h.style.animationDuration = (Math.random() * 6 + 8) + 's';
        container.appendChild(h);
        setTimeout(() => h.remove(), 16000);
      }, 220);
    }
    function stopFallingHearts() {
      if (fallingInterval) clearInterval(fallingInterval);
      document.getElementById('fallingHearts').style.display = 'none';
    }

    // Typewriter
    function typeMessage(element, text, speed = 35) {
      let i = 0;
      element.innerHTML = '';
      function type() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i) === ' ' ? '&nbsp;' : text.charAt(i);
          i++;
          setTimeout(type, speed);
        }
      }
      type();
    }

    const messages = {
      1: "Out of all the people in this world, my heart felt safest with you. And it still does. No matter what phase we go through.",
      2: "You don't even realize how much light you bring into my life. Your presence, your voice, your little habits — they mean more to me than you know.",
      3: "I don't want to win arguments. I want to keep you. Because at the end of the day, being right means nothing if I lose you.",
      4: "No matter how hard days get, my choice doesn't change — it's still you. I'm not giving up on us. I'm here, and I want to make this work, together.",
      5: "I'm sorry for the times I made you feel alone. You are my priority, my peace, and my forever. I love you more than words can code.",
      6: "Every line of my life feels incomplete without you. I promise to be better. Thank you for still loving this flawed coder. ❤️"
    };

    function openFirstEnvelope() {
      const env = document.getElementById('mainEnvelope');
      env.classList.add('open');

      setTimeout(() => {
        env.classList.add('flying-away');
        document.getElementById('textBelow').style.opacity = '1';
        
        setTimeout(() => {
          showMemory(1);
        }, 950);
      }, 1250);
    }

    function showMemory(n) {
      const card = document.getElementById('memory' + n);
      const msgEl = document.getElementById('msg' + n);
      
      card.classList.add('show');
      startFallingHearts();
      typeMessage(msgEl, messages[n]);
    }

    function backToEnvelopes() {
      stopFallingHearts();
      document.querySelectorAll('.memory-card').forEach(card => card.classList.remove('show'));
      
      const pink = document.getElementById('pinkScreen');
      const gridHTML = `
        <div class="envelopes-grid" id="envelopesGrid">
          <div class="envelope" style="width:170px;height:120px;font-size:13px;" onclick="openMemoryFromGrid(1)"><span>Just You 💕</span></div>
          <div class="envelope" style="width:170px;height:120px;font-size:13px;" onclick="openMemoryFromGrid(2)"><span>You Matter ✨</span></div>
          <div class="envelope" style="width:170px;height:120px;font-size:13px;" onclick="openMemoryFromGrid(3)"><span>A Memory 💌</span></div>
          <div class="envelope" style="width:170px;height:120px;font-size:13px;" onclick="openMemoryFromGrid(4)"><span>Still you ❤️</span></div>
          <div class="envelope" style="width:170px;height:120px;font-size:13px;" onclick="openMemoryFromGrid(5)"><span>Forever Yours</span></div>
          <div class="envelope" style="width:170px;height:120px;font-size:13px;" onclick="openMemoryFromGrid(6)"><span>My Everything ❤️</span></div>
        </div>
      `;
      const oldGrid = document.getElementById('envelopesGrid');
      if (oldGrid) oldGrid.remove();
      pink.insertAdjacentHTML('beforeend', gridHTML);
    }

    function openMemoryFromGrid(n) {
      const grid = document.getElementById('envelopesGrid');
      if (grid) grid.style.opacity = '0';
      
      setTimeout(() => {
        if (n === 6) {
          document.getElementById('pinkScreen').style.display = 'none';
          document.getElementById('finalScreen').style.display = 'flex';
          setTimeout(launchConfetti, 400);
        } else {
          showMemory(n);
        }
      }, 450);
    }

    // Confetti
    let confettiCanvas, ctx;
    function launchConfetti() {
      confettiCanvas = document.getElementById('confetti');
      ctx = confettiCanvas.getContext('2d');
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
      const pieces = [];
      const colors = ['#ff6b9d', '#ff99c2', '#ffd1e6', '#fff9c4', '#ff3366'];
      for (let i = 0; i < 280; i++) {
        pieces.push({
          x: Math.random() * confettiCanvas.width,
          y: Math.random() * confettiCanvas.height - confettiCanvas.height,
          size: Math.random() * 14 + 8,
          speed: Math.random() * 6 + 4,
          angle: Math.random() * 360,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 0.04 - 0.02
        });
      }
      function draw() {
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        pieces.forEach((p, i) => {
          p.y += p.speed;
          p.angle += p.rotation;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
          ctx.restore();
          if (p.y > confettiCanvas.height) pieces.splice(i, 1);
        });
        if (pieces.length > 0) requestAnimationFrame(draw);
      }
      draw();
    }

    function launchLove() {
      const btn = document.querySelector('.love-btn');
      btn.style.animation = 'none';
      btn.style.transform = 'scale(1.6)';
      launchConfetti();
      setTimeout(() => {
        alert("❤️ I LOVE YOU TOO!");
        btn.style.transition = 'all 1s';
        btn.style.transform = 'scale(1)';
      }, 600);
    }

    // Initialize
    window.onload = () => {
      createRisingHearts(42);
    };

    window.addEventListener('resize', () => {
      if (confettiCanvas) {
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
      }
    });
  </script>
</body>
</html>
