<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Particle Heart</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}
canvas {
    display: block;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

// ❤️ HEART FORMULA
function heartFunction(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x, y };
}

// CREATE PARTICLES
for (let i = 0; i < 1000; i++) {
    let t = Math.random() * Math.PI * 2;
    let pos = heartFunction(t);

    particles.push({
        baseX: pos.x,
        baseY: pos.y,
        x: pos.x,
        y: pos.y,
        size: Math.random() * 2 + 1
    });
}

// ANIMATION
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(10, 10);

    particles.forEach(p => {
        // floating effect
        p.x = p.baseX + Math.random() * 0.5;
        p.y = p.baseY + Math.random() * 0.5;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size / 10, 0, Math.PI * 2);

        // ❤️ glow color
        ctx.fillStyle = "red";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "red";

        ctx.fill();
    });

    ctx.restore();
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
